# ============================================================
# Audiobook Cleaner — Configuration
# ============================================================
# Copy this file and edit to taste.  CLI flags override values
# set here (e.g.  --sensitivity strict).

# --- Transcription (WhisperX) --------------------------------
transcription:
  model: "large-v2"        # Options: tiny, base, small, medium, large-v2, large-v3
  device: "cuda"            # "cuda" (GPU) or "cpu"
  compute_type: "float16"   # "float16" (GPU), "int8" (faster/lower VRAM), "float32" (CPU)
  language: "en"
  batch_size: 16             # Lower this if you run out of VRAM (try 4 or 8)

# --- Chunking ------------------------------------------------
chunking:
  chunk_mode: sentence       # 'sentence' (recommended) or 'fixed'
  max_sentence_words: 120    # max words per sentence-chunk before forcing a split
  pause_gap_seconds: 1.5     # treat a gap >= this as a sentence boundary
  chunk_size: 800            # Target words per chunk sent to the classifier (fixed mode)
  overlap: 200               # Words of overlap between adjacent chunks (fixed mode)
  min_chunk_size: 300        # Minimum words (smaller remnants merge into previous chunk)
  max_chunk_size: 1500       # Hard ceiling

# --- Profanity (word-level) ----------------------------------
profanity:
  enabled: true
  banned_words_file: "banned_words.txt"
  padding_seconds: 0.0       # Seconds added each side of a banned word.
                              # 0.0 = word-precise (recommended — WhisperX timestamps are reliable).
                              # Set to 0.1–0.3 only if cuts feel abrupt on your audiobook.

# --- AI Classification --------------------------------------
classification:
  # OpenAI
  api_base: "https://api.openai.com/v1"
  api_key: ""                # Set via env var OPENAI_API_KEY or paste here

  # -- OR -- LM Studio (uncomment below, comment out OpenAI above)
  # api_base: "http://localhost:1234/v1"
  # api_key: "not-needed"

  # -- OR -- Ollama (uncomment below)
  # api_base: "http://localhost:11434/v1"
  # api_key: "not-needed"

  model: "gpt-4o-mini"       # or your local model name
  temperature: 0.1           # Low temp = more deterministic classifications
  max_concurrent: 4          # Parallel API requests (lower for local models)
  timeout: 60                # Per-request timeout in seconds
  retry_attempts: 3
  retry_delay: 2.0           # Seconds between retries (multiplied by attempt number)
  bisect: true               # drill down into flagged chunks to find precise boundaries
  bisect_min_seconds: 5.0    # stop bisecting when sub-chunk is shorter than this
  bisect_max_depth: 6        # max recursion depth (safety cap)
  screen_blasphemy: true     # flag religious names/concepts used as expletives or curses
                             # does not flag respectful religious narrative or scripture

# --- Sensitivity ---------------------------------------------
# Choose: "strict", "moderate", or "minimal"
sensitivity: "moderate"

# Per-level thresholds (you can fine-tune these)
thresholds:
  strict:
    min_confidence: 0.3
    min_severity: "mild"
  moderate:
    min_confidence: 0.5
    min_severity: "moderate"
  minimal:
    min_confidence: 0.7
    min_severity: "severe"

# --- Output --------------------------------------------------
output:
  mode: "mute"               # "mute" (silence ranges) or "remove" (cut ranges)
  padding_seconds: 0.0       # Extra seconds added before/after each AI-classified range.
                              # 0.0 = clip exactly at chunk boundaries (recommended).
                              # Set to 0.25–1.0 if you want a safety buffer around scenes.
  format: null               # null = keep input format; or force "mp3" / "m4b"
  report_format: "both"      # "csv", "json", or "both"

  # --- Encoding (null = auto-detect from source file) ----------
  # By default the tool probes the input file with ffprobe and mirrors
  # its bitrate, sample rate, and channel count so the output size
  # stays proportional to the original.  Override only when needed.
  #
  # To inspect what the tool detected, run with -v and look for the
  # "Source audio probed" and "Output encoding" log lines.
  bitrate: null        # e.g. "64k"  — common audiobook values: 32k, 48k, 64k, 128k
  sample_rate: null    # e.g. 22050  — common audiobook values: 22050, 44100
  channels: null       # e.g. 1 (mono, typical for audiobooks) or 2 (stereo)
