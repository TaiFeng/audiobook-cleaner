<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audiobook Cleaner — EDL Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300..700&display=swap" rel="stylesheet" />
<style>
/* ── Design tokens ─────────────────────────────────────────── */
:root {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

  --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-full: 9999px;
  --transition: 150ms cubic-bezier(0.16, 1, 0.3, 1);

  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'Consolas', monospace;
}

/* Light mode */
:root, [data-theme="light"] {
  --bg:              #f5f4f0;
  --surface:         #faf9f7;
  --surface-2:       #ffffff;
  --surface-offset:  #eceae5;
  --border:          #d6d3cc;
  --divider:         #e0ddd8;
  --text:            #1e1c16;
  --text-muted:      #77756f;
  --text-faint:      #b8b7b2;
  --text-inverse:    #f9f8f4;
  --primary:         #01696f;
  --primary-hover:   #0c4e54;
  --primary-hi:      #cedcd8;
  --remove-bg:       #fff0f0;
  --remove-border:   #f5c5c5;
  --remove-text:     #8b1a1a;
  --mute-bg:         #fff8e6;
  --mute-border:     #e8d5a0;
  --mute-text:       #7a5500;
  --context-bg:      #f0f4f8;
  --cut-bg:          #fde8e8;
  --cut-word:        #c0392b;
  --disabled-bg:     #e8e6e2;
  --shadow-sm:       0 1px 3px rgba(0,0,0,.07);
  --shadow-md:       0 4px 12px rgba(0,0,0,.09);
  --shadow-lg:       0 12px 32px rgba(0,0,0,.12);
}

[data-theme="dark"] {
  --bg:              #141310;
  --surface:         #1a1917;
  --surface-2:       #1f1e1c;
  --surface-offset:  #171614;
  --border:          #333230;
  --divider:         #252422;
  --text:            #d0cfc9;
  --text-muted:      #76756f;
  --text-faint:      #4e4d49;
  --text-inverse:    #1e1c16;
  --primary:         #4f98a3;
  --primary-hover:   #3a818c;
  --primary-hi:      #1f3535;
  --remove-bg:       #2a1616;
  --remove-border:   #5a2222;
  --remove-text:     #e87878;
  --mute-bg:         #2a2210;
  --mute-border:     #6b5520;
  --mute-text:       #d4aa55;
  --context-bg:      #1c2530;
  --cut-bg:          #2e1a1a;
  --cut-word:        #e07070;
  --disabled-bg:     #252422;
  --shadow-sm:       0 1px 3px rgba(0,0,0,.3);
  --shadow-md:       0 4px 12px rgba(0,0,0,.4);
  --shadow-lg:       0 12px 32px rgba(0,0,0,.5);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --bg: #141310; --surface: #1a1917; --surface-2: #1f1e1c;
    --surface-offset: #171614; --border: #333230; --divider: #252422;
    --text: #d0cfc9; --text-muted: #76756f; --text-faint: #4e4d49;
    --text-inverse: #1e1c16; --primary: #4f98a3; --primary-hover: #3a818c;
    --primary-hi: #1f3535; --remove-bg: #2a1616; --remove-border: #5a2222;
    --remove-text: #e87878; --mute-bg: #2a2210; --mute-border: #6b5520;
    --mute-text: #d4aa55; --context-bg: #1c2530; --cut-bg: #2e1a1a;
    --cut-word: #e07070; --disabled-bg: #252422;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.3); --shadow-md: 0 4px 12px rgba(0,0,0,.4);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.5);
  }
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
}
button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; }
input[type="range"] { cursor: pointer; }
::selection { background: color-mix(in oklab, var(--primary) 25%, transparent); color: var(--text); }
:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; border-radius: var(--radius-sm); }

/* ── Header ────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: var(--space-3) var(--space-6);
  display: flex; align-items: center; gap: var(--space-4);
}
.logo {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); font-weight: 600; color: var(--text);
  text-decoration: none; flex-shrink: 0;
}
.logo svg { color: var(--primary); }
.header-meta {
  flex: 1; min-width: 0;
  font-size: var(--text-xs); color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-actions { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 500;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--primary); color: var(--text-inverse);
  border: 1px solid transparent;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-ghost {
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-offset); color: var(--text); }
.btn-icon {
  width: 2rem; height: 2rem; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border);
  transition: background var(--transition), color var(--transition);
}
.btn-icon:hover { background: var(--surface-offset); color: var(--text); }

/* ── Drop zone / load screen ───────────────────────────────── */
#load-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100dvh - 57px);
  padding: var(--space-12) var(--space-6);
  gap: var(--space-8);
}
.drop-zone-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--space-6);
  width: 100%; max-width: 680px;
}
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  padding: var(--space-10) var(--space-8);
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--primary);
  background: color-mix(in oklab, var(--primary) 5%, var(--surface));
}
.drop-zone.loaded { border-style: solid; border-color: var(--primary); }
.drop-label {
  font-size: var(--text-sm); font-weight: 600;
  color: var(--primary); margin-bottom: var(--space-2);
}
.drop-hint { font-size: var(--text-xs); color: var(--text-muted); }
.drop-filename { font-size: var(--text-xs); color: var(--text); margin-top: var(--space-2); font-family: var(--font-mono); word-break: break-all; }
.drop-zone input[type="file"] { display: none; }
.load-start-btn {
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.load-start-btn.ready { opacity: 1; pointer-events: auto; }
.load-title {
  font-size: var(--text-xl); font-weight: 700; color: var(--text);
  text-align: center;
}
.load-sub { font-size: var(--text-sm); color: var(--text-muted); text-align: center; }

/* ── Main review layout ─────────────────────────────────────── */
#review-screen { display: none; }
.review-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 0;
  min-height: calc(100dvh - 57px);
}

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: sticky; top: 57px;
  height: calc(100dvh - 57px);
  padding: var(--space-4) 0;
}
.sidebar-title {
  font-size: var(--text-xs); font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
  padding: 0 var(--space-4) var(--space-3);
}
.sidebar-stats {
  display: flex; gap: var(--space-4);
  padding: 0 var(--space-4) var(--space-4);
  border-bottom: 1px solid var(--divider);
  margin-bottom: var(--space-3);
}
.stat { text-align: center; flex: 1; }
.stat-num { font-size: var(--text-lg); font-weight: 700; color: var(--text); line-height: 1; }
.stat-label { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }

.sidebar-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background var(--transition), border-color var(--transition);
}
.sidebar-item:hover { background: var(--surface-offset); }
.sidebar-item.active { background: var(--primary-hi); border-left-color: var(--primary); }
.sidebar-item.disabled { opacity: 0.45; }
.sidebar-badge {
  flex-shrink: 0; width: 1.5rem; height: 1.5rem;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 700;
}
.badge-remove { background: var(--remove-bg); color: var(--remove-text); border: 1px solid var(--remove-border); }
.badge-mute   { background: var(--mute-bg);   color: var(--mute-text);   border: 1px solid var(--mute-border); }
.sidebar-item-info { min-width: 0; flex: 1; }
.sidebar-item-time {
  font-size: var(--text-xs); font-family: var(--font-mono);
  color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-item-dur {
  font-size: var(--text-xs); color: var(--text-faint); margin-top: 1px;
}

/* ── Main content ───────────────────────────────────────────── */
.main-content {
  padding: var(--space-8) var(--space-8);
  max-width: 900px;
}

.edit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-8);
  overflow: hidden;
  scroll-margin-top: 80px;
}
.edit-card.is-disabled { opacity: 0.55; }

/* Card header */
.card-header {
  display: flex; align-items: flex-start; gap: var(--space-4);
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--divider);
}
.card-num {
  flex-shrink: 0;
  width: 1.75rem; height: 1.75rem;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-xs); font-weight: 700;
  margin-top: 2px;
}
.card-num.remove { background: var(--remove-bg); color: var(--remove-text); border: 1px solid var(--remove-border); }
.card-num.mute   { background: var(--mute-bg);   color: var(--mute-text);   border: 1px solid var(--mute-border); }
.card-meta { flex: 1; min-width: 0; }
.card-action-label {
  display: inline-flex; align-items: center; gap: var(--space-1);
  font-size: var(--text-xs); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 2px var(--space-2); border-radius: var(--radius-sm);
  margin-bottom: var(--space-2);
}
.label-remove { background: var(--remove-bg); color: var(--remove-text); border: 1px solid var(--remove-border); }
.label-mute   { background: var(--mute-bg);   color: var(--mute-text);   border: 1px solid var(--mute-border); }
.card-reason { font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-1); }
.card-severity {
  font-size: var(--text-xs); color: var(--text-faint); margin-top: var(--space-1);
}
.card-controls { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
.toggle-btn {
  font-size: var(--text-xs); padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  border: 1px solid var(--border); color: var(--text-muted);
  transition: all var(--transition);
}
.toggle-btn:hover { background: var(--surface-offset); color: var(--text); }
.toggle-btn.enabled { border-color: var(--primary); color: var(--primary); background: var(--primary-hi); }

/* Transcript block */
.transcript-block {
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--divider);
}
.transcript-label {
  font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: var(--space-3);
}
.transcript-text {
  font-size: var(--text-sm); line-height: 1.9;
  font-family: var(--font-mono);
}
.word { cursor: default; }
.word-context { color: var(--text-muted); }
.word-cut {
  background: var(--cut-bg);
  color: var(--cut-word);
  border-radius: 2px;
  padding: 1px 2px;
}
.word-cut.word-edge-start { border-left: 2px solid var(--cut-word); }
.word-cut.word-edge-end   { border-right: 2px solid var(--cut-word); }
.ellipsis { color: var(--text-faint); font-style: italic; font-family: var(--font-body); }
.no-transcript { color: var(--text-faint); font-style: italic; font-size: var(--text-sm); }

/* Sliders */
.slider-block {
  padding: var(--space-5) var(--space-6);
}
.slider-label {
  font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: var(--space-4);
}
.slider-row {
  display: grid; grid-template-columns: 4.5rem 1fr 4.5rem;
  align-items: center; gap: var(--space-3); margin-bottom: var(--space-4);
}
.slider-row:last-of-type { margin-bottom: 0; }
.slider-time-label {
  font-size: var(--text-xs); color: var(--text-muted); text-align: right;
  font-family: var(--font-mono);
}
.slider-time-value {
  font-size: var(--text-xs); color: var(--text); font-weight: 500;
  text-align: left; font-family: var(--font-mono);
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100%; height: 6px;
  border-radius: var(--radius-full);
  outline: none;
  background: var(--divider);
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid var(--surface-2);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
}
input[type="range"]::-webkit-slider-thumb:hover { background: var(--primary-hover); transform: scale(1.15); }
input[type="range"].start-slider::-webkit-slider-thumb { background: #e07b39; }
input[type="range"].start-slider::-webkit-slider-thumb:hover { background: #c05f20; }
input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--primary); border: 2px solid var(--surface-2);
  cursor: pointer;
}
.slider-hint { font-size: var(--text-xs); color: var(--text-faint); margin-top: var(--space-3); }

.duration-chip {
  display: inline-flex; align-items: center; gap: var(--space-1);
  font-size: var(--text-xs); font-family: var(--font-mono);
  padding: 2px var(--space-2); border-radius: var(--radius-full);
  background: var(--surface-offset); color: var(--text-muted);
  margin-left: var(--space-3);
}
.duration-chip.changed { background: var(--primary-hi); color: var(--primary); }

/* Card footer */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--surface-offset);
  gap: var(--space-4);
}
.footer-times {
  font-size: var(--text-xs); font-family: var(--font-mono); color: var(--text-muted);
}
.footer-times span { color: var(--text); font-weight: 500; }
.reset-link {
  font-size: var(--text-xs); color: var(--primary); text-decoration: underline;
  background: none; border: none; cursor: pointer; padding: 0;
  transition: color var(--transition);
}
.reset-link:hover { color: var(--primary-hover); }
.reset-link:disabled { color: var(--text-faint); pointer-events: none; }

/* ── Empty / loading states ─────────────────────────────────── */
.empty-state {
  text-align: center; padding: var(--space-16) var(--space-8);
  color: var(--text-muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: var(--space-4); }
.empty-title { font-size: var(--text-lg); font-weight: 600; color: var(--text); margin-bottom: var(--space-2); }
.empty-sub { font-size: var(--text-sm); }

/* ── Toast ──────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: var(--space-6); right: var(--space-6);
  background: var(--text); color: var(--bg);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-md); font-size: var(--text-sm);
  box-shadow: var(--shadow-lg);
  transform: translateY(120%); opacity: 0;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
  pointer-events: none; z-index: 1000;
  max-width: 340px;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ── Context window control ─────────────────────────────────── */
.context-bar {
  display: flex; align-items: center; gap: var(--space-4);
  padding: var(--space-4) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--divider);
  background: var(--surface-offset);
}
.context-bar label { font-size: var(--text-xs); color: var(--text-muted); font-weight: 500; }
.context-bar input[type="number"] {
  width: 4rem; padding: var(--space-1) var(--space-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-size: var(--text-xs); font-family: var(--font-mono);
}
.filter-bar { display: flex; gap: var(--space-2); }
.filter-btn {
  font-size: var(--text-xs); padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full); border: 1px solid var(--border);
  color: var(--text-muted); transition: all var(--transition);
}
.filter-btn.active { background: var(--primary); color: var(--text-inverse); border-color: var(--primary); }
.filter-btn:hover:not(.active) { background: var(--surface-offset); color: var(--text); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    EDL Review
  </div>
  <div class="header-meta" id="header-meta">No files loaded</div>
  <div class="header-actions">
    <button class="btn-icon" data-theme-toggle aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <button class="btn btn-ghost" id="btn-reload" style="display:none" onclick="resetToLoad()">Load different files</button>
    <button class="btn btn-primary" id="btn-save" style="display:none" onclick="saveEdl()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save EDL
    </button>
  </div>
</header>

<!-- Load screen -->
<div id="load-screen">
  <div class="load-title">Review &amp; Adjust Cuts</div>
  <div class="load-sub">Load your EDL and transcript to inspect flagged segments and fine-tune cut boundaries.</div>
  <div class="drop-zone-row">
    <!-- EDL drop zone -->
    <div class="drop-zone" id="dz-edl" onclick="document.getElementById('fi-edl').click()"
         ondragover="dzDragOver(event,'dz-edl')" ondragleave="dzDragLeave('dz-edl')" ondrop="dzDrop(event,'edl')">
      <input type="file" id="fi-edl" accept=".json" onchange="loadFile(event,'edl')" />
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto var(--space-3);color:var(--primary)">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      <div class="drop-label">edl.json</div>
      <div class="drop-hint">Edit Decision List</div>
      <div class="drop-filename" id="dz-edl-name" style="display:none"></div>
    </div>
    <!-- Transcript drop zone -->
    <div class="drop-zone" id="dz-tx" onclick="document.getElementById('fi-tx').click()"
         ondragover="dzDragOver(event,'dz-tx')" ondragleave="dzDragLeave('dz-tx')" ondrop="dzDrop(event,'transcript')">
      <input type="file" id="fi-tx" accept=".json" onchange="loadFile(event,'transcript')" />
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto var(--space-3);color:var(--primary)">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <div class="drop-label">transcript.json</div>
      <div class="drop-hint">WhisperX word transcript</div>
      <div class="drop-filename" id="dz-tx-name" style="display:none"></div>
    </div>
  </div>
  <button class="btn btn-primary load-start-btn" id="btn-start" onclick="startReview()">
    Start Review →
  </button>
</div>

<!-- Review screen -->
<div id="review-screen">
  <div class="context-bar">
    <label for="ctx-words">Context words:</label>
    <input type="number" id="ctx-words" value="50" min="5" max="300" step="5" onchange="rerenderAll()" />
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="remove" onclick="setFilter('remove',this)">Remove</button>
      <button class="filter-btn" data-filter="mute" onclick="setFilter('mute',this)">Mute</button>
    </div>
  </div>
  <div class="review-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content" id="main-content"></main>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────
let edlData = null;
let txWords = [];       // [{word, start, end, score}]
let edits = [];         // working copy, mutated by sliders/toggles
let origEdits = [];     // deep copy of original for reset
let edlFilename = 'edl_adjusted.json';
let activeFilter = 'all';

// ── Theme toggle ─────────────────────────────────────────────
(function() {
  const toggle = document.querySelector('[data-theme-toggle]');
  const html = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  toggle && toggle.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    toggle.innerHTML = theme === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

// ── File loading ─────────────────────────────────────────────
let loadedEdl = false, loadedTx = false;

function loadFile(evt, type) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (type === 'edl') {
        edlData = data;
        edlFilename = file.name.replace(/\.json$/i, '_adjusted.json');
        loadedEdl = true;
        const dz = document.getElementById('dz-edl');
        dz.classList.add('loaded');
        const nm = document.getElementById('dz-edl-name');
        nm.textContent = file.name; nm.style.display = 'block';
      } else {
        // transcript is array of words or object with words key
        txWords = Array.isArray(data) ? data : (data.words || data.segments || []);
        loadedTx = true;
        const dz = document.getElementById('dz-tx');
        dz.classList.add('loaded');
        const nm = document.getElementById('dz-tx-name');
        nm.textContent = file.name; nm.style.display = 'block';
      }
      document.getElementById('btn-start').classList.toggle('ready', loadedEdl);
    } catch(err) {
      toast('Error parsing JSON: ' + err.message, 4000);
    }
  };
  reader.readAsText(file);
}

function dzDragOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('drag-over'); }
function dzDragLeave(id) { document.getElementById(id).classList.remove('drag-over'); }
function dzDrop(e, type) {
  e.preventDefault();
  const id = type === 'edl' ? 'dz-edl' : 'dz-tx';
  dzDragLeave(id);
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const fakeEvt = { target: { files: [file] } };
  loadFile(fakeEvt, type);
}

// ── Start review ─────────────────────────────────────────────
function startReview() {
  if (!loadedEdl) { toast('Please load an edl.json first.'); return; }

  // Build working edits array — support both old and new EDL format
  const rawEdits = edlData.edits || [];
  edits = rawEdits.map((e, i) => ({
    idx: i,
    edit_number: e.edit_number || (i + 1),
    action: e.action || edlData.mode || 'mute',
    start: e.start,
    end: e.end,
    origStart: e.start,
    origEnd: e.end,
    reason: e.reason || '',
    source: e.source || '',
    severity: e.severity || '',
    confidence: e.confidence ?? null,
    disabled: false,
  }));
  origEdits = JSON.parse(JSON.stringify(edits));

  document.getElementById('load-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('btn-reload').style.display = '';

  const removeCount = edits.filter(e => e.action === 'remove').length;
  const muteCount   = edits.filter(e => e.action === 'mute').length;
  document.getElementById('header-meta').textContent =
    `${edits.length} edits — ${removeCount} remove, ${muteCount} mute`;

  renderAll();
}

function resetToLoad() {
  document.getElementById('load-screen').style.display = 'flex';
  document.getElementById('review-screen').style.display = 'none';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-reload').style.display = 'none';
  edlData = null; txWords = []; edits = []; origEdits = [];
  loadedEdl = false; loadedTx = false;
  document.getElementById('dz-edl').classList.remove('loaded');
  document.getElementById('dz-tx').classList.remove('loaded');
  document.getElementById('dz-edl-name').style.display = 'none';
  document.getElementById('dz-tx-name').style.display = 'none';
  document.getElementById('btn-start').classList.remove('ready');
  document.getElementById('fi-edl').value = '';
  document.getElementById('fi-tx').value = '';
  document.getElementById('header-meta').textContent = 'No files loaded';
}

// ── Filter ────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderAll();
}

function visibleEdits() {
  if (activeFilter === 'all') return edits;
  return edits.filter(e => e.action === activeFilter);
}

// ── Render ────────────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderCards();
}

function rerenderAll() { renderAll(); }

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const visible = visibleEdits();
  const removeCount = edits.filter(e => e.action === 'remove').length;
  const muteCount   = edits.filter(e => e.action === 'mute').length;

  sidebar.innerHTML = `
    <div class="sidebar-title">Edits</div>
    <div class="sidebar-stats">
      <div class="stat"><div class="stat-num">${edits.length}</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--remove-text)">${removeCount}</div><div class="stat-label">Remove</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--mute-text)">${muteCount}</div><div class="stat-label">Mute</div></div>
    </div>
    ${visible.map(e => `
      <div class="sidebar-item ${e.disabled ? 'disabled' : ''}" id="si-${e.idx}" onclick="scrollToCard(${e.idx})">
        <div class="sidebar-badge badge-${e.action}">${e.edit_number}</div>
        <div class="sidebar-item-info">
          <div class="sidebar-item-time">${fmt(e.start)} → ${fmt(e.end)}</div>
          <div class="sidebar-item-dur">${fmtDur(e.end - e.start)} · ${e.action}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderCards() {
  const container = document.getElementById('main-content');
  const visible = visibleEdits();

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-title">No edits to show</div>
      <div class="empty-sub">Change the filter to see other edit types.</div>
    </div>`;
    return;
  }

  container.innerHTML = visible.map(e => buildCard(e)).join('');

  // Attach slider events after render
  visible.forEach(e => attachSliders(e));
}

function buildCard(e) {
  const ctxWords = parseInt(document.getElementById('ctx-words').value) || 50;
  const { before, cut, after } = getTranscriptSegments(e.start, e.end, ctxWords);
  const dur = e.end - e.start;
  const origDur = e.origEnd - e.origStart;
  const changed = Math.abs(e.start - e.origStart) > 0.001 || Math.abs(e.end - e.origEnd) > 0.001;

  // Slider bounds: expand slightly beyond context window edges for flexibility
  const firstCtxWord = txWords.find(w => w.start >= (before.length ? before[0].start : e.start));
  const minSlider = before.length ? before[0].start : Math.max(0, e.start - 5);
  const maxEnd = txWords[txWords.length - 1]?.end ?? e.end + 5;
  const afterEnd = after.length ? after[after.length - 1].end : Math.min(maxEnd, e.end + 5);

  // Word boundary arrays for snapping
  const windowWords = [...before, ...cut, ...after];
  const snapPoints = windowWords.map(w => ({ s: w.start, e: w.end }));

  return `
  <div class="edit-card ${e.disabled ? 'is-disabled' : ''}" id="card-${e.idx}" data-idx="${e.idx}">
    <div class="card-header">
      <div class="card-num ${e.action}">${e.edit_number}</div>
      <div class="card-meta">
        <div class="card-action-label label-${e.action}">
          ${e.action === 'remove' ? '✂ Remove' : '🔇 Mute'}
        </div>
        ${e.reason ? `<div class="card-reason">${escHtml(e.reason)}</div>` : ''}
        ${e.severity ? `<div class="card-severity">Severity: ${e.severity}${e.confidence !== null ? ` · Confidence: ${Math.round(e.confidence * 100)}%` : ''}</div>` : ''}
      </div>
      <div class="card-controls">
        <button class="toggle-btn ${!e.disabled ? 'enabled' : ''}" onclick="toggleEdit(${e.idx})" title="${e.disabled ? 'Enable this edit' : 'Disable this edit'}">
          ${e.disabled ? 'Disabled' : 'Enabled'}
        </button>
      </div>
    </div>

    <div class="transcript-block">
      <div class="transcript-label">
        Transcript
        <span class="duration-chip ${changed ? 'changed' : ''}" id="dur-chip-${e.idx}">
          ${fmtDur(dur)}${changed ? ' (adjusted)' : ''}
        </span>
      </div>
      <div class="transcript-text" id="tx-${e.idx}">
        ${renderTranscript(before, cut, after)}
      </div>
    </div>

    <div class="slider-block">
      <div class="slider-label">Adjust cut boundaries — snap to word edges</div>
      <div class="slider-row">
        <div class="slider-time-label">Start</div>
        <input type="range" class="start-slider"
          id="sl-start-${e.idx}"
          min="${minSlider.toFixed(3)}"
          max="${(e.end - 0.001).toFixed(3)}"
          step="0.001"
          value="${e.start.toFixed(3)}"
          data-idx="${e.idx}"
          data-type="start"
        />
        <div class="slider-time-value" id="sv-start-${e.idx}">${fmt(e.start)}</div>
      </div>
      <div class="slider-row">
        <div class="slider-time-label">End</div>
        <input type="range"
          id="sl-end-${e.idx}"
          min="${(e.start + 0.001).toFixed(3)}"
          max="${afterEnd.toFixed(3)}"
          step="0.001"
          value="${e.end.toFixed(3)}"
          data-idx="${e.idx}"
          data-type="end"
        />
        <div class="slider-time-value" id="sv-end-${e.idx}">${fmt(e.end)}</div>
      </div>
      <div class="slider-hint">Drag to adjust. Releases snap to the nearest WhisperX word boundary.</div>
    </div>

    <div class="card-footer">
      <div class="footer-times">
        <span>${fmt(e.start)}</span> → <span>${fmt(e.end)}</span>
        &nbsp;·&nbsp; ${fmtDur(e.end - e.start)}
        ${changed ? `<span style="color:var(--primary);margin-left:var(--space-2)">✓ adjusted</span>` : ''}
      </div>
      <button class="reset-link" onclick="resetEdit(${e.idx})" ${!changed ? 'disabled' : ''} id="reset-${e.idx}">
        Reset to original
      </button>
    </div>
  </div>`;
}

function attachSliders(e) {
  const slStart = document.getElementById(`sl-start-${e.idx}`);
  const slEnd   = document.getElementById(`sl-end-${e.idx}`);
  if (!slStart || !slEnd) return;

  // Build snap points from words in the vicinity
  const ctxWords = parseInt(document.getElementById('ctx-words').value) || 50;
  const vicinity = txWords.filter(w =>
    w.end >= Math.max(0, e.start - 60) && w.start <= e.end + 60
  );

  function nearestWordBoundary(t, type) {
    // type = 'start' snaps to word starts, 'end' snaps to word ends
    if (!vicinity.length) return t;
    let best = null, bestDist = Infinity;
    vicinity.forEach(w => {
      const pt = type === 'start' ? w.start : w.end;
      const d = Math.abs(pt - t);
      if (d < bestDist) { bestDist = d; best = pt; }
    });
    return best ?? t;
  }

  slStart.addEventListener('input', () => {
    const raw = parseFloat(slStart.value);
    document.getElementById(`sv-start-${e.idx}`).textContent = fmt(raw);
    // Enforce start < end
    if (raw >= e.end) slStart.value = (e.end - 0.001).toFixed(3);
    slEnd.min = (raw + 0.001).toFixed(3);
  });

  slStart.addEventListener('change', () => {
    const raw = parseFloat(slStart.value);
    const snapped = nearestWordBoundary(raw, 'start');
    e.start = snapped;
    slStart.value = snapped.toFixed(3);
    document.getElementById(`sv-start-${e.idx}`).textContent = fmt(snapped);
    slEnd.min = (snapped + 0.001).toFixed(3);
    updateCardFooter(e);
    rerenderTranscript(e);
    updateSidebarItem(e);
  });

  slEnd.addEventListener('input', () => {
    const raw = parseFloat(slEnd.value);
    document.getElementById(`sv-end-${e.idx}`).textContent = fmt(raw);
    if (raw <= e.start) slEnd.value = (e.start + 0.001).toFixed(3);
    slStart.max = (raw - 0.001).toFixed(3);
  });

  slEnd.addEventListener('change', () => {
    const raw = parseFloat(slEnd.value);
    const snapped = nearestWordBoundary(raw, 'end');
    e.end = snapped;
    slEnd.value = snapped.toFixed(3);
    document.getElementById(`sv-end-${e.idx}`).textContent = fmt(snapped);
    slStart.max = (snapped - 0.001).toFixed(3);
    updateCardFooter(e);
    rerenderTranscript(e);
    updateSidebarItem(e);
  });
}

function updateCardFooter(e) {
  const origDur = e.origEnd - e.origStart;
  const dur = e.end - e.start;
  const changed = Math.abs(e.start - e.origStart) > 0.001 || Math.abs(e.end - e.origEnd) > 0.001;
  const footer = document.querySelector(`#card-${e.idx} .card-footer`);
  if (footer) {
    footer.innerHTML = `
      <div class="footer-times">
        <span>${fmt(e.start)}</span> → <span>${fmt(e.end)}</span>
        &nbsp;·&nbsp; ${fmtDur(dur)}
        ${changed ? `<span style="color:var(--primary);margin-left:var(--space-2)">✓ adjusted</span>` : ''}
      </div>
      <button class="reset-link" onclick="resetEdit(${e.idx})" ${!changed ? 'disabled' : ''} id="reset-${e.idx}">
        Reset to original
      </button>`;
  }
  const chip = document.getElementById(`dur-chip-${e.idx}`);
  if (chip) {
    chip.className = `duration-chip ${changed ? 'changed' : ''}`;
    chip.textContent = fmtDur(dur) + (changed ? ' (adjusted)' : '');
  }
}

function rerenderTranscript(e) {
  const ctxCount = parseInt(document.getElementById('ctx-words').value) || 50;
  const { before, cut, after } = getTranscriptSegments(e.start, e.end, ctxCount);
  const el = document.getElementById(`tx-${e.idx}`);
  if (el) el.innerHTML = renderTranscript(before, cut, after);
}

function updateSidebarItem(e) {
  const si = document.getElementById(`si-${e.idx}`);
  if (si) {
    si.querySelector('.sidebar-item-time').textContent = `${fmt(e.start)} → ${fmt(e.end)}`;
    si.querySelector('.sidebar-item-dur').textContent = `${fmtDur(e.end - e.start)} · ${e.action}`;
  }
}

// ── Transcript helpers ────────────────────────────────────────
function getTranscriptSegments(start, end, ctxCount) {
  if (!txWords.length) return { before: [], cut: [], after: [] };
  const cut = txWords.filter(w => w.start >= start && w.end <= end);
  // fallback: words overlapping the range
  const cutFallback = !cut.length ? txWords.filter(w => w.end > start && w.start < end) : cut;
  const cutFinal = cutFallback.length ? cutFallback : cut;
  const cutSet = new Set(cutFinal.map(w => w));
  const cutStart = cutFinal[0]?.start ?? start;
  const cutEnd   = cutFinal[cutFinal.length - 1]?.end ?? end;
  const before = txWords.filter(w => w.end <= cutStart).slice(-ctxCount);
  const after  = txWords.filter(w => w.start >= cutEnd).slice(0, ctxCount);
  return { before, cut: cutFinal, after };
}

function renderTranscript(before, cut, after) {
  if (!txWords.length) return `<span class="no-transcript">Load a transcript.json to see the text here.</span>`;
  if (!before.length && !cut.length && !after.length) {
    return `<span class="no-transcript">No words found in this time range.</span>`;
  }

  const beforeTx = txWords.length > 50 && txWords.indexOf(before[0]) > 0;
  const afterTx  = txWords.length > 50 && after.length && txWords.indexOf(after[after.length-1]) < txWords.length - 1;

  let html = '';
  if (beforeTx) html += `<span class="ellipsis">… </span>`;
  before.forEach(w => {
    html += `<span class="word word-context" title="${w.start.toFixed(3)}s – ${w.end.toFixed(3)}s">${escHtml(w.word)} </span>`;
  });
  cut.forEach((w, i) => {
    const isFirst = i === 0, isLast = i === cut.length - 1;
    html += `<span class="word word-cut ${isFirst ? 'word-edge-start' : ''} ${isLast ? 'word-edge-end' : ''}" title="${w.start.toFixed(3)}s – ${w.end.toFixed(3)}s">${escHtml(w.word)} </span>`;
  });
  after.forEach(w => {
    html += `<span class="word word-context" title="${w.start.toFixed(3)}s – ${w.end.toFixed(3)}s">${escHtml(w.word)} </span>`;
  });
  if (afterTx) html += `<span class="ellipsis"> …</span>`;
  return html;
}

// ── Toggle / reset ────────────────────────────────────────────
function toggleEdit(idx) {
  const e = edits[idx];
  e.disabled = !e.disabled;
  const card = document.getElementById(`card-${idx}`);
  card && card.classList.toggle('is-disabled', e.disabled);
  const btn = card && card.querySelector('.toggle-btn');
  if (btn) {
    btn.classList.toggle('enabled', !e.disabled);
    btn.textContent = e.disabled ? 'Disabled' : 'Enabled';
  }
  const si = document.getElementById(`si-${idx}`);
  si && si.classList.toggle('disabled', e.disabled);
}

function resetEdit(idx) {
  const e = edits[idx];
  const orig = origEdits[idx];
  e.start = orig.start; e.end = orig.end;

  // Reset slider values
  const slStart = document.getElementById(`sl-start-${idx}`);
  const slEnd   = document.getElementById(`sl-end-${idx}`);
  if (slStart) { slStart.value = orig.start.toFixed(3); document.getElementById(`sv-start-${idx}`).textContent = fmt(orig.start); }
  if (slEnd)   { slEnd.value   = orig.end.toFixed(3);   document.getElementById(`sv-end-${idx}`).textContent   = fmt(orig.end); }

  updateCardFooter(e);
  rerenderTranscript(e);
  updateSidebarItem(e);
}

function scrollToCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  card && card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Save ─────────────────────────────────────────────────────
function saveEdl() {
  if (!edlData) { toast('No EDL loaded.'); return; }

  // Build updated edl — preserve all top-level keys, update edits array
  const activeEdits = edits.filter(e => !e.disabled);
  const updatedEdits = edlData.edits.map((orig, i) => {
    const e = edits.find(x => x.idx === i);
    if (!e || e.disabled) return null;
    return {
      ...orig,
      start: e.start,
      end: e.end,
      start_formatted: fmt(e.start),
      end_formatted: fmt(e.end),
      duration: parseFloat((e.end - e.start).toFixed(3)),
    };
  }).filter(Boolean);

  const muteEdits   = updatedEdits.filter(e => (e.action || edlData.mode) === 'mute');
  const removeEdits = updatedEdits.filter(e => (e.action || edlData.mode) === 'remove');

  const out = {
    ...edlData,
    total_edits: updatedEdits.length,
    total_muted_seconds:   parseFloat(muteEdits.reduce((s, e) => s + e.duration, 0).toFixed(2)),
    total_removed_seconds: parseFloat(removeEdits.reduce((s, e) => s + e.duration, 0).toFixed(2)),
    edits: updatedEdits,
  };
  // Remove legacy key if present
  delete out.total_edited_seconds;

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = edlFilename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast(`Saved as ${edlFilename}`);
}

// ── Formatting helpers ────────────────────────────────────────
function fmt(t) {
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = (t % 60).toFixed(2).padStart(5, '0');
  return h ? `${h}:${String(m).padStart(2,'0')}:${s}` : `${m}:${s}`;
}
function fmtDur(d) {
  if (d < 60) return `${d.toFixed(1)}s`;
  const m = Math.floor(d / 60), s = Math.round(d % 60);
  return `${m}m ${s}s`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}
</script>
